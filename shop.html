<!DOCTYPE html>
<html lang="en">
<head>
  

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | VELORA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="shop.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">VELO<span>R</span>A</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html" class="text-accent">Shop</a>
        <a href="shop.html?category=Men">Men</a>
        <a href="shop.html?category=Women">Women</a>
        <a href="shop.html?category=Kids">Kids</a>
        <a href="shop.html?sale=true">Sale</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-icons">
        <button><i data-lucide="search"></i></button>
        <button><i data-lucide="heart"></i></button>
        <a href="login.html" class="auth-link"><i data-lucide="user"></i></a>
        <button id="cart-btn">
          <i data-lucide="shopping-bag"></i>
          <span class="cart-badge">0</span>
        </button>
        <button class="mobile-menu-btn" id="mobile-menu-btn"><i data-lucide="menu"></i></button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="mobile-menu">
    <div class="mobile-menu-header">
      <div class="logo">VELO<span>R</span>A</div>
      <button id="mobile-menu-close"><i data-lucide="x"></i></button>
    </div>
    <nav class="mobile-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="shop.html?category=Men">Men</a>
      <a href="shop.html?category=Women">Women</a>
      <a href="shop.html?category=Kids">Kids</a>
      <a href="shop.html?sale=true">Sale</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>

  <!-- Cart Drawer -->
  <div id="cart-overlay" class="cart-overlay"></div>
  <div id="cart-drawer" class="cart-drawer">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="cart-close" class="cart-close"><i data-lucide="x"></i></button>
    </div>
    <div id="cart-drawer-items" class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="cart-drawer-total">৳ 0</span>
      </div>
      <a href="cart.html" class="btn btn-primary btn-checkout">View Cart & Checkout</a>
    </div>
  </div>

  <!-- Page Banner -->
  <div class="page-banner">
    <div class="container">
      <h1 class="page-title">Shop All</h1>
      <div class="breadcrumb">
        <a href="index.html">Home</a> / <span>Shop</span>
      </div>
    </div>
  </div>

  <!-- Shop Layout -->
  <section class="section-padding">
    <div class="container">
      <div class="shop-layout">
        <!-- Sidebar -->
        <aside class="shop-sidebar">
          <div class="filter-group">
            <h3 class="filter-title">Categories</h3>
            <div class="filter-list">
              <label class="filter-label"><input type="checkbox" value="Men"> Men</label>
              <label class="filter-label"><input type="checkbox" value="Women"> Women</label>
              <label class="filter-label"><input type="checkbox" value="Kids"> Kids</label>
              <label class="filter-label"><input type="checkbox" value="Accessories"> Accessories</label>
            </div>
          </div>
          
          <div class="filter-group">
            <h3 class="filter-title">Size</h3>
            <div class="filter-list">
              <label class="filter-label"><input type="checkbox" value="S"> Small</label>
              <label class="filter-label"><input type="checkbox" value="M"> Medium</label>
              <label class="filter-label"><input type="checkbox" value="L"> Large</label>
              <label class="filter-label"><input type="checkbox" value="XL"> X-Large</label>
            </div>
          </div>
          
          <div class="filter-group">
            <h3 class="filter-title">Price Range</h3>
            <div class="filter-list">
              <label class="filter-label"><input type="radio" name="price" value="all" checked> All Prices</label>
              <label class="filter-label"><input type="radio" name="price" value="0-1000"> Under ৳ 1,000</label>
              <label class="filter-label"><input type="radio" name="price" value="1000-2000"> ৳ 1,000 - ৳ 2,000</label>
              <label class="filter-label"><input type="radio" name="price" value="2000+"> Over ৳ 2,000</label>
            </div>
          </div>
        </aside>

        <!-- Main Content -->
        <main>
          <div class="shop-header">
            <p class="text-muted">Showing <span id="product-count">9</span> results</p>
            <select class="sort-select" id="sort-select">
              <option value="default">Default Sorting</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="newest">Newest Arrivals</option>
            </select>
          </div>
          <div id="shop-grid" class="product-grid">
            <!-- Products rendered via JS -->
          </div>
        </main>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 VELORA. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <div id="toast-container" class="toast-container"></div>
  <button id="scroll-top" class="scroll-top"><i data-lucide="arrow-up"></i></button>

  <script src="main.js"></script>
  <script src="cart.js"></script>
  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {       if (typeof lucide !== 'undefined') {         lucide.createIcons();       }     });
    
    // Simple filter logic for shop page
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const categoryParam = urlParams.get('category');
      const saleParam = urlParams.get('sale');
      
      let filteredProducts = [...products];
      
      if (categoryParam) {
        filteredProducts = filteredProducts.filter(p => p.category === categoryParam);
        document.querySelector('.page-title').textContent = categoryParam;
        
        // Check the corresponding checkbox
        const checkbox = document.querySelector(`input[value="${categoryParam}"]`);
        if (checkbox) checkbox.checked = true;
      }
      
      if (saleParam === 'true') {
        filteredProducts = filteredProducts.filter(p => p.badge === 'Sale');
        document.querySelector('.page-title').textContent = 'Sale';
      }
      
      const shopGrid = document.getElementById('shop-grid');
      const countEl = document.getElementById('product-count');
      
      if (shopGrid && countEl) {
        renderProducts(filteredProducts, shopGrid);
        countEl.textContent = filteredProducts.length;
      }
      
      // Sort logic
      const sortSelect = document.getElementById('sort-select');
      if (sortSelect) {
        sortSelect.addEventListener('change', (e) => {
          let sorted = [...filteredProducts];
          if (e.target.value === 'price-low') {
            sorted.sort((a, b) => (a.salePrice || a.price) - (b.salePrice || b.price));
          } else if (e.target.value === 'price-high') {
            sorted.sort((a, b) => (b.salePrice || b.price) - (a.salePrice || a.price));
          } else if (e.target.value === 'newest') {
            sorted.sort((a, b) => a.badge === 'New' ? -1 : 1);
          }
          renderProducts(sorted, shopGrid);
        });
      }
    });
  </script>
</body>
</html>
